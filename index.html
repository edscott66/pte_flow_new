<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PTE Flow</title>
    <script>
      // Shim for require to prevent ReferenceErrors in browser
      if (typeof window !== 'undefined' && typeof window.require === 'undefined') {
        window.require = function(path) {
          console.warn('require("' + path + '") called in browser. Node-style require is not supported.');
          return undefined;
        };
        window.require.context = function() {
          return function() { return []; };
        };
      }
    </script>
  </head>
  <body class="overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
